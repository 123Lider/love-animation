<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love 3D App</title>
<style>
body{margin:0;background:black;color:white;font-family:sans-serif}
#plus{position:fixed;top:10px;right:10px;font-size:30px;cursor:pointer}
.card{border:1px solid #444;margin:10px;padding:10px;border-radius:10px}
.menu{float:right;cursor:pointer}
#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000c}
#modalContent{background:#111;padding:20px;margin:50px}
input,select{margin:5px;padding:10px;width:90%}
button{padding:10px;margin:5px;cursor:pointer}
.linkRow{display:flex;align-items:center;justify-content:space-between;gap:10px}
.linkText{font-size:12px;word-break:break-all;color:#aaa}
.copyBtn{padding:5px 10px}
canvas{margin-top:10px}
</style>
</head>
<body>

<div id="plus" onclick="openModal()">➕</div>
<div id="list"></div>

<div id="modal">
  <div id="modalContent">
    <input id="text" placeholder="Write your text"><br>
    
    <input type="file" id="image">
    <button onclick="removeImage()">Remove Image</button><br>

    <input type="file" id="music">
    <button onclick="removeMusic()">Remove Music</button><br>

    <select id="qrStyle">
      <option value="default">Default QR</option>
      <option value="love">Love ❤️</option>
      <option value="neon">Neon</option>
      <option value="minimal">Minimal</option>
    </select><br>

    <button onclick="create()">Generate QR</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<div id="viewer"></div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSy...",
  authDomain:"love-animation-69d0b.firebaseapp.com",
  projectId:"love-animation-69d0b"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let editingId=null;
let removeImg=false;
let removeMus=false;

function openModal(){document.getElementById("modal").style.display="block";}
function closeModal(){document.getElementById("modal").style.display="none";}
function removeImage(){removeImg=true;}
function removeMusic(){removeMus=true;}

async function upload(file){
  if(!file) return "";
  const f=new FormData();
  f.append("file",file);
  f.append("upload_preset","love_app");

  const r=await fetch("https://api.cloudinary.com/v1_1/do5lrh38k/upload",{method:"POST",body:f});
  const d=await r.json();
  return d.secure_url;
}

async function create(){
  const text=document.getElementById("text").value;
  if(!text) return alert("Text must!");

  let img=removeImg?"":await upload(document.getElementById("image").files[0]);
  let music=removeMus?"":await upload(document.getElementById("music").files[0]);
  let style=document.getElementById("qrStyle").value;

  let id=editingId||Date.now().toString();

  await db.collection("projects").doc(id).set({text,img,music,style});

  editingId=null;
  removeImg=false;
  removeMus=false;

  closeModal();
  load();
}

function copyLink(link){
  navigator.clipboard.writeText(link);
  alert("Copied!");
}

async function load(){
  const list=document.getElementById("list");
  list.innerHTML="";

  const snap=await db.collection("projects").get();

  snap.forEach(doc=>{
    const d=doc.data();
    const id=doc.id;
    const link=location.origin+location.pathname+"?id="+id;

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <span class="menu" onclick="menu('${id}','${d.text}')">⋮</span>
      <b>${d.text}</b><br>

      <div class="linkRow">
        <div class="linkText">${link}</div>
        <button class="copyBtn" onclick="copyLink('${link}')">Copy</button>
      </div>

      <canvas id="qr${id}"></canvas>
    `;

    list.appendChild(div);

    renderQR(id, link, d.style);
  });
}

function qrOptions(style){
  if(style=="love"){
    return {color:{dark:"#ff4d6d",light:"#000"},margin:2};
  }
  if(style=="neon"){
    return {color:{dark:"#00fff0",light:"#000"},margin:1};
  }
  if(style=="minimal"){
    return {color:{dark:"#fff",light:"#000"},margin:6};
  }
  return {color:{dark:"#fff",light:"#000"},margin:3};
}

function renderQR(id, link, style){
  const canvas=document.getElementById("qr"+id);
  QRCode.toCanvas(canvas, link, qrOptions(style));
}

function menu(id,text){
  const action=prompt("edit / delete");
  if(action=="delete"){
    db.collection("projects").doc(id).delete().then(load);
  }
  if(action=="edit"){
    editingId=id;
    openModal();
    document.getElementById("text").value=text;
  }
}

const params=new URLSearchParams(location.search);
const id=params.get("id");

if(id){
  document.getElementById("plus").style.display="none";
  document.getElementById("list").style.display="none";

  db.collection("projects").doc(id).get().then(doc=>{
    const d=doc.data();
    start3D(d.text,d.img,d.music);
  });
}else{
  load();
}

function start3D(text,bg,music){

  if(music){
    const audio=document.createElement("audio");
    audio.src=music;
    audio.autoplay=true;
    audio.loop=true;
    document.body.appendChild(audio);
  }

  const scene=new THREE.Scene();

  if(bg){
    new THREE.TextureLoader().load(bg,tex=>scene.background=tex);
  }

  const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
  camera.position.set(-15,5,20);

  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  const controls=new THREE.OrbitControls(camera,renderer.domElement);

  scene.add(new THREE.PointLight(0xffffff,1).position.set(10,10,10));

  const loader=new THREE.FontLoader();
  let texts=[];

  loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json',font=>{
    for(let i=0;i<80;i++){
      const geo=new THREE.TextGeometry(text,{font,size:Math.random()*0.4+0.2,height:0.02});
      const mat=new THREE.MeshBasicMaterial({color:0xff66cc});
      const mesh=new THREE.Mesh(geo,mat);
      mesh.position.set((Math.random()-0.5)*40,Math.random()*20,(Math.random()-0.5)*40);
      scene.add(mesh);
      texts.push(mesh);
    }
  });

  function animate(){
    requestAnimationFrame(animate);
    texts.forEach(t=>{
      t.position.y-=0.03;
      if(t.position.y<-15)t.position.y=15;
    });
    controls.update();
    renderer.render(scene,camera);
  }
  animate();
}
</script>
</body>
</html>

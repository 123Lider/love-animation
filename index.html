<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love 3D App</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
}

/* TOP BAR */
#topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:flex-end;
  padding:10px;
  z-index:100;
}

#plus{
  font-size:28px;
  cursor:pointer;
  margin-right:10px;
}

/* LIST */
#list{
  margin-top:60px;
  padding:10px;
}

.card{
  border:1px solid #444;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  position:relative;
}

/* THREE DOT */
.menuBtn{
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
}

/* MODAL */
#modal, #menuModal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background:#000a;
  z-index:200;
}

.box{
  background:#111;
  margin:50px auto;
  padding:20px;
  width:90%;
  max-width:400px;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  width:100%;
}

/* LOGIN */
#login{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* RESPONSIVE */
@media(min-width:600px){
  .box{max-width:500px;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <button onclick="login()">Login with Gmail</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div id="topbar">
  <div id="plus" onclick="openModal()">➕</div>
</div>

<div id="list"></div>

</div>

<!-- CREATE MODAL -->
<div id="modal">
  <div class="box">
    <input id="text1" placeholder="Text 1 (required)">
    <input id="text2" placeholder="Text 2 (optional)">
    <input id="text3" placeholder="Text 3 (optional)">

    <label>❤️ Heart</label>
    <input type="checkbox" id="heart">

    <input type="file" id="image">
    <input type="file" id="music">

    <button onclick="create()">Generate QR</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- MENU MODAL -->
<div id="menuModal">
  <div class="box">
    <button onclick="editItem()">Edit</button>
    <button onclick="deleteItem()">Delete</button>
    <button onclick="closeMenu()">Close</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSy...",
  authDomain:"love-animation-69d0b.firebaseapp.com",
  projectId:"love-animation-69d0b"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// ❌ AUTO LOGIN OFF
firebase.auth().signOut();

// LOGIN
function login(){
  const provider=new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithRedirect(provider);
}

// LOGIN STATE
firebase.auth().onAuthStateChanged(user=>{
  if(user){
    loginDiv.style.display="none";
    app.style.display="block";
    load();
  }
});

// MODAL
function openModal(){ modal.style.display="block"; }
function closeModal(){ modal.style.display="none"; }

// MENU
let currentId=null;

function openMenu(id){
  currentId=id;
  menuModal.style.display="block";
}
function closeMenu(){ menuModal.style.display="none"; }

// CLOUDINARY
async function upload(file){
  if(!file) return "";
  let f=new FormData();
  f.append("file",file);
  f.append("upload_preset","love_app");

  let r=await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/upload",{method:"POST",body:f});
  let d=await r.json();
  return d.secure_url;
}

// CREATE
async function create(){
  let t1=text1.value;
  let t2=text2.value;
  let t3=text3.value;

  if(!t1) return alert("Text required");

  let img=await upload(image.files[0]);
  let music=await upload(musicInput.files[0]);

  let id=Date.now().toString();

  await db.collection("projects").doc(id).set({
    texts:[t1,t2,t3],
    img,
    music,
    heart:heart.checked
  });

  closeModal();
  load();
}

// LOAD
async function load(){
  list.innerHTML="";
  let snap=await db.collection("projects").get();

  snap.forEach(doc=>{
    let d=doc.data();
    let id=doc.id;
    let link=location.origin+location.pathname+"?id="+id;

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="menuBtn" onclick="openMenu('${id}')">⋮</div>
      <b>${d.texts[0]}</b><br>
      <small>${link}</small><br>
      <canvas id="qr${id}"></canvas>
    `;

    list.appendChild(div);
    QRCode.toCanvas(document.getElementById("qr"+id),link);
  });
}

// EDIT
function editItem(){
  closeMenu();
  alert("Edit feature basic version, modify manually");
}

// DELETE
function deleteItem(){
  db.collection("projects").doc(currentId).delete().then(()=>{
    closeMenu();
    load();
  });
}
</script>

</body>
</html>

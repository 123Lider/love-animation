<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Animation</title>
<style>
body{margin:0;overflow:hidden;background:black}
</style>
</head>

<body>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2023/03/27/audio_5f9c6bb5c3.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const params=new URLSearchParams(location.search);

const t1=params.get("t1")||"I love you";
const t2=params.get("t2")||"";
const t3=params.get("t3")||"";

const textsToShow=[t1,t2,t3].filter(t=>t!=="");

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x000000,10,60);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(-15,5,20);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

const light=new THREE.PointLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);

const glowLight=new THREE.PointLight(0xff66cc,1,50);
scene.add(glowLight);

const loader=new THREE.FontLoader();
let meshes=[];

loader.load("https://threejs.org/examples/fonts/helvetiker_regular.typeface.json",(font)=>{

textsToShow.forEach(txt=>{
for(let i=0;i<30;i++){

const geo=new THREE.TextGeometry(txt,{
font:font,
size:Math.random()*0.4+0.2,
height:0.02
});

const mat=new THREE.MeshBasicMaterial({color:0xff99cc});
const mesh=new THREE.Mesh(geo,mat);

mesh.position.x=(Math.random()-0.5)*40;
mesh.position.y=Math.random()*20;
mesh.position.z=(Math.random()-0.5)*40;

scene.add(mesh);
meshes.push(mesh);
}
});

});

// animation
function animate(){
requestAnimationFrame(animate);

meshes.forEach(m=>{
m.position.y-=0.03;
if(m.position.y<-15)m.position.y=15;
});

controls.update();
renderer.render(scene,camera);
}
animate();

document.body.onclick=()=>music.play();

window.onresize=()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
};
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love 3D App</title>
<style>
body{margin:0;background:black;color:white;font-family:sans-serif}
#plus{position:fixed;top:10px;right:10px;font-size:30px;cursor:pointer}
.card{border:1px solid #444;margin:10px;padding:10px;border-radius:10px}
.menu{float:right;cursor:pointer}
#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000c}
#modalContent{background:#111;padding:20px;margin:50px}
input{margin:5px;padding:10px;width:90%}
button{padding:10px;margin:5px}
</style>
</head>
<body>

<div id="plus" onclick="openModal()">➕</div>
<div id="list"></div>

<div id="modal">
  <div id="modalContent">
    <input id="text" placeholder="Write your text"><br>
    
    <input type="file" id="image">
    <button onclick="removeImage()">Remove Image</button><br>

    <input type="file" id="music">
    <button onclick="removeMusic()">Remove Music</button><br>

    <button onclick="create()">Generate QR</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<div id="viewer"></div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSy...",
  authDomain:"love-animation-69d0b.firebaseapp.com",
  projectId:"love-animation-69d0b"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let editingId=null;
let removeImg=false;
let removeMus=false;

// MODAL
function openModal(){
  document.getElementById("modal").style.display="block";
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}

// REMOVE
function removeImage(){ removeImg=true; alert("Image removed"); }
function removeMusic(){ removeMus=true; alert("Music removed"); }

// UPLOAD
async function upload(file){
  if(!file) return "";
  const f=new FormData();
  f.append("file",file);
  f.append("upload_preset","love_app");

  const r=await fetch("https://api.cloudinary.com/v1_1/do5lrh38k/upload",{method:"POST",body:f});
  const d=await r.json();
  return d.secure_url;
}

// CREATE
async function create(){
  const text=document.getElementById("text").value;
  if(!text) return alert("Text must!");

  let img = removeImg ? "" : await upload(document.getElementById("image").files[0]);
  let music = removeMus ? "" : await upload(document.getElementById("music").files[0]);

  let id=editingId || Date.now().toString();

  await db.collection("projects").doc(id).set({
    text, img, music
  });

  editingId=null;
  removeImg=false;
  removeMus=false;

  closeModal();
  load();
}

// LOAD LIST
async function load(){
  const list=document.getElementById("list");
  list.innerHTML="";

  const snap=await db.collection("projects").get();

  snap.forEach(doc=>{
    const d=doc.data();
    const id=doc.id;
    const link=location.origin+location.pathname+"?id="+id;

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <span class="menu" onclick="menu('${id}','${d.text}')">⋮</span>
      <b>${d.text}</b><br>
      <small>${link}</small><br>
      <canvas id="qr${id}"></canvas>
    `;

    list.appendChild(div);
    QRCode.toCanvas(document.getElementById("qr"+id),link);
  });
}

// MENU
function menu(id,text){
  const action=prompt("edit / delete");

  if(action=="delete"){
    db.collection("projects").doc(id).delete().then(load);
  }

  if(action=="edit"){
    editingId=id;
    openModal();
    document.getElementById("text").value=text;
  }
}

// VIEW MODE (3D)
const params=new URLSearchParams(location.search);
const id=params.get("id");

if(id){
  document.getElementById("plus").style.display="none";
  document.getElementById("list").style.display="none";

  db.collection("projects").doc(id).get().then(doc=>{
    const d=doc.data();

    start3D(d.text, d.img, d.music);
  });
}else{
  load();
}

// 🎥 3D FUNCTION
function start3D(text, bg, music){

  if(music){
    const audio=document.createElement("audio");
    audio.src=music;
    audio.autoplay=true;
    audio.loop=true;
    document.body.appendChild(audio);
  }

  const scene=new THREE.Scene();

  if(bg){
    const loader=new THREE.TextureLoader();
    loader.load(bg, tex=>{
      scene.background=tex;
    });
  }

  const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
  camera.position.set(-15,5,20);

  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  const controls=new THREE.OrbitControls(camera,renderer.domElement);

  const light=new THREE.PointLight(0xffffff,1);
  light.position.set(10,10,10);
  scene.add(light);

  const loaderF=new THREE.FontLoader();

  let texts=[];

  loaderF.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', font=>{
    for(let i=0;i<80;i++){
      const geo=new THREE.TextGeometry(text,{
        font:font,
        size:Math.random()*0.4+0.2,
        height:0.02
      });

      const mat=new THREE.MeshBasicMaterial({color:0xff66cc});
      const mesh=new THREE.Mesh(geo,mat);

      mesh.position.x=(Math.random()-0.5)*40;
      mesh.position.y=Math.random()*20;
      mesh.position.z=(Math.random()-0.5)*40;

      scene.add(mesh);
      texts.push(mesh);
    }
  });

  function animate(){
    requestAnimationFrame(animate);

    texts.forEach(t=>{
      t.position.y-=0.03;
      if(t.position.y<-15) t.position.y=15;
    });

    controls.update();
    renderer.render(scene,camera);
  }
  animate();
}
</script>
</body>
</html>

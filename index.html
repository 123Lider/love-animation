<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Animation</title>
<style>
body{margin:0;overflow:hidden;background:black}
</style>
</head>

<body>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2023/03/27/audio_5f9c6bb5c3.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const params = new URLSearchParams(location.search);
const text = params.get("text") || "I love you";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75, innerWidth/innerHeight, 0.1, 1000
);

camera.position.z = 20;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.PointLight(0xffffff, 1);
light.position.set(10,10,10);
scene.add(light);

const loader = new THREE.FontLoader();
let meshes = [];

loader.load(
"https://threejs.org/examples/fonts/helvetiker_regular.typeface.json",
(font) => {

for(let i=0;i<50;i++){
const geo = new THREE.TextGeometry(text,{
font:font,
size:0.5,
height:0.05
});

const mat = new THREE.MeshBasicMaterial({color:0xff69b4});
const mesh = new THREE.Mesh(geo, mat);

mesh.position.x = (Math.random()-0.5)*20;
mesh.position.y = Math.random()*15;

scene.add(mesh);
meshes.push(mesh);
}
}
);

function animate(){
requestAnimationFrame(animate);

meshes.forEach(m=>{
m.position.y -= 0.05;
if(m.position.y < -10) m.position.y = 10;
});

renderer.render(scene, camera);
}
animate();

document.body.onclick = () => music.play();

window.onresize = () => {
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
};
</script>

</body>
</html>

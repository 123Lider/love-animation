<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love 3D App</title>
<style>
body{margin:0;background:black;color:white;font-family:sans-serif}
#plus{position:fixed;top:12px;right:12px;font-size:30px;cursor:pointer;z-index:999}

.card{border:1px solid #444;margin:10px;padding:10px;border-radius:12px;position:relative;z-index:1}
.menu{position:absolute;right:10px;top:10px;cursor:pointer;z-index:10}

#modal{
  display:none;
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  z-index:1000;
}
#modalContent{
  background:#111;
  padding:20px;
  margin:80px auto;
  width:90%;
  max-width:400px;
  border-radius:15px;
  box-shadow:0 0 20px #ff4d6d55;
}

input,select{
  margin:6px 0;
  padding:10px;
  width:100%;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  margin:5px 0;
  width:100%;
  border-radius:8px;
  border:none;
  cursor:pointer;
  background:#ff4d6d;
  color:white;
}

.linkRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-top:5px;
}

.linkText{
  font-size:12px;
  word-break:break-all;
  color:#aaa;
}

.copyBtn{
  padding:6px 10px;
  background:#333;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

canvas{margin-top:10px}
</style>
</head>
<body>

<div id="plus" onclick="openModal()">➕</div>
<div id="list"></div>

<div id="modal">
  <div id="modalContent">
    <input id="text" placeholder="Write your text">

    <input type="file" id="image">
    <input type="file" id="music">

    <select id="qrStyle">
      <option value="default">Default</option>
      <option value="love">Love ❤️</option>
      <option value="heart">Heart QR 💖</option>
      <option value="neon">Neon</option>
      <option value="minimal">Minimal</option>
    </select>

    <button onclick="create()">Generate QR</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSy...",
  authDomain:"love-animation-69d0b.firebaseapp.com",
  projectId:"love-animation-69d0b"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let editingId=null;

function openModal(){document.getElementById("modal").style.display="block"}
function closeModal(){document.getElementById("modal").style.display="none"}

async function upload(file){
  if(!file) return "";
  const f=new FormData();
  f.append("file",file);
  f.append("upload_preset","love_app");

  const r=await fetch("https://api.cloudinary.com/v1_1/do5lrh38k/upload",{method:"POST",body:f});
  const d=await r.json();
  return d.secure_url;
}

async function create(){
  const text=document.getElementById("text").value;
  if(!text) return alert("Text must!");

  let img=await upload(document.getElementById("image").files[0]);
  let music=await upload(document.getElementById("music").files[0]);
  let style=document.getElementById("qrStyle").value;

  let id=editingId||Date.now().toString();

  await db.collection("projects").doc(id).set({text,img,music,style});

  editingId=null;
  closeModal();
  load();
}

function copyLink(link){navigator.clipboard.writeText(link);alert("Copied")}

async function load(){
  const list=document.getElementById("list");
  list.innerHTML="";

  const snap=await db.collection("projects").get();

  snap.forEach(doc=>{
    const d=doc.data();
    const id=doc.id;
    const link=location.origin+location.pathname+"?id="+id;

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="menu" onclick="menu('${id}','${d.text}')">⋮</div>
      <b>${d.text}</b>

      <div class="linkRow">
        <div class="linkText">${link}</div>
        <button class="copyBtn" onclick="copyLink('${link}')">Copy</button>
      </div>

      <div id="qr${id}"></div>
    `;

    list.appendChild(div);
    renderQR(id,link,d.style);
  });
}

function qrConfig(style){

  if(style=="love"){
    return {
      width:120,
      height:120,
      dotsOptions:{color:"#ff4d6d",type:"rounded"},
      backgroundOptions:{color:"#000"}
    }
  }

  if(style=="heart"){
    return {
      width:140,
      height:140,
      image:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/42/Love_Heart_SVG.svg/1024px-Love_Heart_SVG.svg.png",
      imageOptions:{crossOrigin:"anonymous",margin:5},
      dotsOptions:{color:"#ff0033",type:"rounded"},
      cornersSquareOptions:{type:"extra-rounded",color:"#ff0033"},
      backgroundOptions:{color:"#000"}
    }
  }

  if(style=="neon"){
    return {
      width:120,
      height:120,
      dotsOptions:{color:"#00fff0",type:"classy"},
      backgroundOptions:{color:"#000"}
    }
  }

  return {
    width:120,
    height:120,
    dotsOptions:{color:"#fff",type:"square"},
    backgroundOptions:{color:"#000"}
  }
}

function renderQR(id,link,style){
  const qr=new QRCodeStyling({
    ...qrConfig(style),
    data:link
  });

  document.getElementById("qr"+id).innerHTML="";
  qr.append(document.getElementById("qr"+id));
}

function menu(id,text){
  const a=prompt("edit / delete");

  if(a=="delete") db.collection("projects").doc(id).delete().then(load);

  if(a=="edit"){
    editingId=id;
    openModal();
    document.getElementById("text").value=text;
  }
}

const params=new URLSearchParams(location.search);
const id=params.get("id");

if(!id){load();}
</script>

</body>
</html>

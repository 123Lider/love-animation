<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love 3D App</title>
<style>
body{margin:0;background:black;color:white;font-family:sans-serif}
#plus{position:fixed;top:10px;right:10px;font-size:30px;cursor:pointer}
.card{border:1px solid #444;margin:10px;padding:10px;border-radius:10px}
.menu{float:right;cursor:pointer}
#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000c}
#modalContent{background:#111;padding:20px;margin:50px}
input{margin:5px;padding:10px;width:90%}
button{padding:10px;margin:5px}
</style>
</head>
<body>

<div id="plus" onclick="openModal()">➕</div>
<div id="list"></div>

<div id="modal">
  <div id="modalContent">
    <input id="text1" placeholder="Text 1 (required)"><br>
    <input id="text2" placeholder="Text 2 (optional)"><br>
    <input id="text3" placeholder="Text 3 (optional)"><br>

    <label>❤️ Heart Effect</label>
    <input type="checkbox" id="heartToggle"><br>

    <input type="file" id="image"><br>
    <input type="file" id="music"><br>

    <button onclick="create()">Generate QR</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSy...",
  authDomain:"love-animation-69d0b.firebaseapp.com",
  projectId:"love-animation-69d0b"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

function openModal(){ modal.style.display="block"; }
function closeModal(){ modal.style.display="none"; }

async function upload(file){
  if(!file) return "";
  let f=new FormData();
  f.append("file",file);
  f.append("upload_preset","love_app");

  let r=await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/upload",{method:"POST",body:f});
  let d=await r.json();
  return d.secure_url;
}

async function create(){
  let text1=text1Input.value;
  let text2=text2Input.value;
  let text3=text3Input.value;
  if(!text1) return alert("Text1 required");

  let img=await upload(image.files[0]);
  let music=await upload(musicInput.files[0]);

  let id=Date.now().toString();

  await db.collection("projects").doc(id).set({
    texts:[text1,text2,text3],
    img, music,
    heart:heartToggle.checked
  });

  let link=location.origin+location.pathname+"?id="+id;
  alert(link);
}

async function load(){
  list.innerHTML="";
  let snap=await db.collection("projects").get();

  snap.forEach(doc=>{
    let d=doc.data();
    let id=doc.id;
    let link=location.origin+location.pathname+"?id="+id;

    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <b>${d.texts[0]}</b><br>
      <small>${link}</small><br>
      <canvas id="qr${id}"></canvas>
    `;
    list.appendChild(div);
    QRCode.toCanvas(document.getElementById("qr"+id),link);
  });
}

const params=new URLSearchParams(location.search);
const id=params.get("id");

if(id){
  plus.style.display="none";
  list.style.display="none";

  db.collection("projects").doc(id).get().then(doc=>{
    let d=doc.data();
    start3D(d);
  });
}else{
  load();
}

function start3D(data){

  // 🎵 music fix
  if(data.music){
    let audio=new Audio(data.music);
    document.body.addEventListener("click",()=>audio.play());
  }

  let scene=new THREE.Scene();

  if(data.img){
    new THREE.TextureLoader().load(data.img,tex=>scene.background=tex);
  }

  let camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
  camera.position.set(-15,5,20);

  let renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  let controls=new THREE.OrbitControls(camera,renderer.domElement);

  let light=new THREE.PointLight(0xffffff,1);
  light.position.set(10,10,10);
  scene.add(light);

  let texts=[];
  let hearts=[];

  new THREE.FontLoader().load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json',font=>{

    data.texts.forEach(t=>{
      if(!t) return;

      for(let i=0;i<30;i++){
        let geo=new THREE.TextGeometry(t,{font,size:0.3,height:0.02});
        let mesh=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0xff66cc}));

        mesh.position.set((Math.random()-0.5)*30,Math.random()*20,(Math.random()-0.5)*30);
        scene.add(mesh);
        texts.push(mesh);
      }
    });

    // ❤️ heart optional
    if(data.heart){
      let shape=new THREE.Shape();
      shape.moveTo(0,0);
      shape.bezierCurveTo(0,3,-5,3,-5,0);
      shape.bezierCurveTo(-5,-3,0,-5,0,-2);
      shape.bezierCurveTo(0,-5,5,-3,5,0);
      shape.bezierCurveTo(5,3,0,3,0,0);

      for(let i=0;i<30;i++){
        let geo=new THREE.ExtrudeGeometry(shape,{depth:0.5});
        let mesh=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0xff0000}));

        mesh.scale.set(0.2,0.2,0.2);
        mesh.position.set((Math.random()-0.5)*30,Math.random()*20,(Math.random()-0.5)*30);

        scene.add(mesh);
        hearts.push(mesh);
      }
    }

  });

  function animate(){
    requestAnimationFrame(animate);

    texts.forEach(t=>{
      t.position.y-=0.03;
      if(t.position.y<-15) t.position.y=15;
    });

    hearts.forEach(h=>{
      h.position.y-=0.04;
      if(h.position.y<-15) h.position.y=15;
    });

    controls.update();
    renderer.render(scene,camera);
  }
  animate();
}
</script>

</body>
</html>

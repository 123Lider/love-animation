<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate 3D Love</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
</style>
</head>
<body>

<!-- 🎵 Music -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/audio/2023/03/27/audio_5f9c6bb5c3.mp3" type="audio/mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();

// 🌌 Fog = depth feel
scene.fog = new THREE.Fog(0x000000, 10, 60);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(-15, 5, 20);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lights
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(10,10,10);
scene.add(light);

// 🔥 Glow light (pink)
const glowLight = new THREE.PointLight(0xff66cc, 1, 50);
glowLight.position.set(0,0,0);
scene.add();

// Font
const loader = new THREE.FontLoader();

let texts = [];
let hearts = [];

loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', function(font){

  // ✨ TEXT (thin + glow vibe)
const messages = [
  "I love you baby",
  "Tahsen+Onima",
  "Miss you jan",
  "I love you baby",
  "Tahsen+Onima",
  "",
  "",
  ""
];

for(let i=0; i<80; i++){

  // 🔀 random message select
  const randomText = messages[Math.floor(Math.random() * messages.length)];

  const geo = new THREE.TextGeometry(randomText, {
    font: font,
    size: Math.random()*0.7 + 0.2,
    height: 0.1,
    curveSegments: 4
  });

    const mat = new THREE.MeshBasicMaterial({ color: 0xff99cc });

    const mesh = new THREE.Mesh(geo, mat);

    mesh.position.x = (Math.random()-0.5)*25;
    mesh.position.y = Math.random()*20;
    mesh.position.z = (Math.random()-0.5)*20;

    scene.add(mesh);
    texts.push(mesh);
  }

  // ❤️ HEART SHAPE
  const heartShape = new THREE.Shape();
  heartShape.moveTo(0,0);
  heartShape.bezierCurveTo(0,3,-5,3,-5,0);
  heartShape.bezierCurveTo(-5,-3,0,-5,0,-2);
  heartShape.bezierCurveTo(0,-5,5,-3,5,0);
  heartShape.bezierCurveTo(5,3,0,3,0,0);

  const extrudeSettings = {
    depth: 0.5,
    bevelEnabled: true,
    bevelSize: 0.3,
    bevelThickness: 0.3
  };

  for(let i=0; i<30; i++){
    const geo = new THREE.ExtrudeGeometry(heartShape, extrudeSettings);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xff0000,
      emissive: 0x550000 // glow feel
    });

    const heart = new THREE.Mesh(geo, mat);
    heart.scale.set(0.25,0.25,0.25);

    heart.position.x = (Math.random()-0.5)*30;
    heart.position.y = Math.random()*20;
    heart.position.z = (Math.random()-0.5)*30;

    scene.add(heart);
    hearts.push(heart);
  }

});

// 🎬 Animation
function animate(){
  requestAnimationFrame(animate);

  // text falling
  texts.forEach(t=>{
    t.position.y -= 0.03;
    if(t.position.y < -15) t.position.y = 15;
  });

  // ❤️ hearts (fall + pulse)
  hearts.forEach(h=>{
    h.position.y -= 0.05;

    // 💓 pulse effect
    let scale = 0.25 + Math.sin(Date.now()*0.005)*0.05;
    h.scale.set(scale, scale, scale);

    h.rotation.y += 0.02;

    if(h.position.y < -15) h.position.y = 15;
  });

  controls.update();
  renderer.render(scene, camera);
}
animate();

// 🎵 Play music on click
document.body.addEventListener("click", ()=>{
  document.getElementById("bgMusic").play();
});

// Resize
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>

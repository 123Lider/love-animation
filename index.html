<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love 3D App</title>
<style>
body{margin:0;background:black;color:white;font-family:sans-serif; overflow: hidden;}
#plus{position:fixed;top:10px;right:10px;font-size:30px;cursor:pointer; z-index: 100;}
#authBox{position:fixed;top:10px;left:10px;z-index:100; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px;}
.card{border:1px solid #444;margin:10px;padding:10px;border-radius:10px; background: #111; word-wrap: break-word;}
.menu{float:right;cursor:pointer; font-size: 20px;}
#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000c; z-index: 200; overflow-y: auto;}
#modalContent{background:#111;padding:20px;margin:20px auto; max-width: 400px; border-radius: 10px;}
input{margin:5px 0;padding:10px;width:90%; box-sizing: border-box; background: #222; color: white; border: 1px solid #555;}
button{padding:10px;margin:5px 0; cursor: pointer; background: #4caf50; color: white; border: none; border-radius: 5px;}
.remove-btn {background: #f44336;}
#list {height: 100vh; overflow-y: auto; padding-top: 50px;}
canvas {background: white; padding: 5px; border-radius: 5px; margin-top: 10px;}
</style>
</head>
<body>

<!-- Authentication UI -->
<div id="authBox">
    <button id="loginBtn" onclick="login()">Login with Google</button>
    <div id="userInfo" style="display:none;">
        <span id="userName" style="margin-right: 10px; font-weight: bold;"></span>
        <button class="remove-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div id="plus" onclick="openModal()" style="display:none;">➕</div>
<div id="list">
    <p style="text-align:center; margin-top:50px;">Please login to see your projects.</p>
</div>

<!-- Modal -->
<div id="modal">
  <div id="modalContent">
    <h3>Create 3D Animation</h3>
    <input id="text1" placeholder="Write text 1 (Must)"><br>
    <input id="text2" placeholder="Write text 2 (Optional)"><br>
    <input id="text3" placeholder="Write text 3 (Optional)"><br>
    
    <label>Background Image:</label><br>
    <input type="file" id="image">
    <button class="remove-btn" onclick="removeImage()">Remove Image</button><br>

    <label>Background Music:</label><br>
    <input type="file" id="music">
    <button class="remove-btn" onclick="removeMusic()">Remove Music</button><br>

    <button onclick="create()" style="width: 100%;">Generate QR & Link</button>
    <button onclick="closeModal()" style="width: 100%; background: #555;">Close</button>
  </div>
</div>

<div id="viewer"></div>

<!-- Firebase Scripts (Compat Version for v9) -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
// ১. আপনার ফায়ারবেস কনফিগারেশন দিন
const firebaseConfig={
  apiKey:"AIzaSy...", // আপনার API key দিন
  authDomain:"love-animation-69d0b.firebaseapp.com",
  projectId:"love-animation-69d0b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;
let editingId = null;
let removeImg = false;
let removeMus = false;

// URL Check
const params = new URLSearchParams(location.search);
const viewId = params.get("id");

// ২. Authentication Logic
auth.onAuthStateChanged(user => {
    currentUser = user;
    if(user) {
        // User logged in
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('userInfo').style.display = 'inline-block';
        document.getElementById('userName').innerText = user.displayName;
        document.getElementById('plus').style.display = 'block';
        
        if(!viewId) load(); // শুধু এডিটর মোডে থাকলে লিস্ট লোড হবে
    } else {
        // User logged out
        document.getElementById('loginBtn').style.display = 'block';
        document.getElementById('userInfo').style.display = 'none';
        document.getElementById('plus').style.display = 'none';
        
        if(!viewId) {
            document.getElementById("list").innerHTML = "<p style='text-align:center; margin-top:50px;'>Please login to see your projects.</p>";
        }
    }
});

function login() { auth.signInWithPopup(provider); }
function logout() { auth.signOut(); }

// MODAL
function openModal(){
  document.getElementById("modal").style.display="block";
}
function closeModal(){
  document.getElementById("modal").style.display="none";
  // Reset inputs
  document.getElementById("text1").value = "";
  document.getElementById("text2").value = "";
  document.getElementById("text3").value = "";
  editingId = null;
}

function removeImage(){ removeImg=true; alert("Image removed"); }
function removeMusic(){ removeMus=true; alert("Music removed"); }

// UPLOAD (Cloudinary)
async function upload(file){
  if(!file) return "";
  const f=new FormData();
  f.append("file",file);
  f.append("upload_preset","love_app"); // আপনার Cloudinary preset দিন

  // YOUR_CLOUD_NAME পরিবর্তন করে নিজেরটা দিন
  const r=await fetch("https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/upload",{method:"POST",body:f});
  const d=await r.json();
  return d.secure_url;
}

// CREATE / EDIT
async function create(){
  if(!currentUser) return alert("Please login first!");

  const t1 = document.getElementById("text1").value;
  const t2 = document.getElementById("text2").value;
  const t3 = document.getElementById("text3").value;

  if(!t1) return alert("Text 1 is required!");

  // ৩টা টেক্সট নিয়ে একটা Array বানাচ্ছি, ফাঁকাগুলো বাদ দিয়ে দিচ্ছি
  const textsArray = [t1, t2, t3].filter(t => t && t.trim() !== "");

  document.getElementById("modalContent").style.opacity = "0.5"; // Loading effect

  let img = removeImg ? "" : await upload(document.getElementById("image").files[0]);
  let music = removeMus ? "" : await upload(document.getElementById("music").files[0]);

  let id = editingId || Date.now().toString();

  let dataToSave = {
    texts: textsArray, // এখন ৩টা টেক্সট array হিসেবে সেভ হচ্ছে
    userId: currentUser.uid // ইউজারের ID সেভ করে রাখছি
  };

  // যদি নতুন ইমেজ বা মিউজিক দেয় বা রিমুভ করে
  if(document.getElementById("image").files[0] || removeImg) dataToSave.img = img;
  if(document.getElementById("music").files[0] || removeMus) dataToSave.music = music;

  await db.collection("projects").doc(id).set(dataToSave, { merge: true });

  document.getElementById("modalContent").style.opacity = "1";
  editingId=null;
  removeImg=false;
  removeMus=false;

  closeModal();
  load();
}

// LOAD LIST
async function load(){
  if(!currentUser) return;
  const list=document.getElementById("list");
  list.innerHTML="";

  // শুধু লগইন করা ইউজারের ডেটাগুলো আনছি
  const snap = await db.collection("projects").where("userId", "==", currentUser.uid).get();

  if(snap.empty) {
      list.innerHTML = "<p style='text-align:center;'>No projects found. Click ➕ to create.</p>";
      return;
  }

  snap.forEach(doc=>{
    const d=doc.data();
    const id=doc.id;
    const link=location.origin+location.pathname+"?id="+id;

    // পুরনো ডেটা (text) এবং নতুন ডেটা (texts array) হ্যান্ডেল করা
    const displayTexts = d.texts ? d.texts.join(" | ") : d.text;
    const safeTexts = d.texts ? JSON.stringify(d.texts).replace(/"/g, '&quot;') : `["${d.text}"]`;

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <span class="menu" onclick="menu('${id}', ${safeTexts})">⋮</span>
      <b>${displayTexts}</b><br>
      <small style="color:#aaa;">${link}</small><br>
      <canvas id="qr${id}"></canvas>
    `;

    list.appendChild(div);
    QRCode.toCanvas(document.getElementById("qr"+id),link, {width: 120});
  });
}

// MENU
function menu(id, textsArr){
  const action=prompt("Type 'edit' to edit or 'delete' to delete:");

  if(action=="delete"){
    if(confirm("Are you sure?")) {
        db.collection("projects").doc(id).delete().then(load);
    }
  }

  if(action=="edit"){
    editingId=id;
    openModal();
    // ৩টা বক্সে পুরনো টেক্সট বসিয়ে দিচ্ছি
    if(textsArr[0]) document.getElementById("text1").value = textsArr[0];
    if(textsArr[1]) document.getElementById("text2").value = textsArr[1];
    if(textsArr[2]) document.getElementById("text3").value = textsArr[2];
  }
}

// VIEW MODE (3D)
if(viewId){
  // Viewer Mode - লগইন ছাড়া সবাই দেখতে পারবে
  document.getElementById("authBox").style.display="none";
  document.getElementById("plus").style.display="none";
  document.getElementById("list").style.display="none";

  db.collection("projects").doc(viewId).get().then(doc=>{
    if(doc.exists) {
        const d=doc.data();
        // ৩টা টেক্সটের array পাস করছি
        const textsToPlay = d.texts ? d.texts : [d.text];
        start3D(textsToPlay, d.img, d.music);
    } else {
        alert("Animation not found!");
    }
  });
}

// 🎥 3D FUNCTION
function start3D(textArray, bg, music){
  if(music){
    const audio=document.createElement("audio");
    audio.src=music;
    audio.autoplay=true;
    audio.loop=true;
    // User interaction required for audio in modern browsers
    document.body.addEventListener('click', () => { audio.play(); }, {once:true});
    document.body.appendChild(audio);
  }

  const scene=new THREE.Scene();

  if(bg){
    const loader=new THREE.TextureLoader();
    loader.load(bg, tex=>{
      scene.background=tex;
    });
  }

  const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
  camera.position.set(-15,5,20);

  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  const controls=new THREE.OrbitControls(camera,renderer.domElement);

  const light=new THREE.PointLight(0xffffff,1);
  light.position.set(10,10,10);
  scene.add(light);

  const loaderF=new THREE.FontLoader();

  let texts=[];

  loaderF.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', font=>{
    for(let i=0;i<80;i++){
      // Array থেকে রেন্ডম একটি টেক্সট পিক করা হচ্ছে
      const randomText = textArray[Math.floor(Math.random() * textArray.length)];

      const geo=new THREE.TextGeometry(randomText,{
        font:font,
        size:Math.random()*0.4+0.3,
        height:0.02
      });

      const colors = [0xff66cc, 0x66ccff, 0xffcc66, 0xffffff];
      const randomColor = colors[Math.floor(Math.random() * colors.length)];
      const mat=new THREE.MeshBasicMaterial({color: randomColor});
      const mesh=new THREE.Mesh(geo,mat);

      mesh.position.x=(Math.random()-0.5)*40;
      mesh.position.y=Math.random()*20;
      mesh.position.z=(Math.random()-0.5)*40;

      scene.add(mesh);
      texts.push(mesh);
    }
  });

  function animate(){
    requestAnimationFrame(animate);
    texts.forEach(t=>{
      t.position.y-=0.04;
      if(t.position.y<-15) t.position.y=15;
    });
    controls.update();
    renderer.render(scene,camera);
  }
  animate();
}
</script>
</body>
</html>
